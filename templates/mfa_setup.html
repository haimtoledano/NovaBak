<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Setup - VM Backup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-blue-600 mb-2">Enable Two-Factor Auth</h2>
        <p class="text-sm text-gray-600 mb-6">Scan the QR code below with your Authenticator App (Google/Microsoft), then enter the 6-digit code to verify.</p>
        
        {% if error %}
        <div class="bg-red-100 text-red-700 p-2 mb-4 text-sm rounded">{{ error }}</div>
        {% endif %}

        <div class="flex justify-center mb-6">
            <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" class="border p-2 rounded shadow-sm">
        </div>

        <form action="/mfa_verify" method="POST" class="space-y-4">
            <input type="hidden" name="secret" value="{{ secret }}">
            <div>
                <input type="text" name="mfa_code" required placeholder="000111" class="text-center tracking-widest text-xl block w-full rounded-md border-gray-300 shadow-sm border p-3">
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700">
                Verify & Save
            </button>
        </form>
    </div>
</body>
</html>
